<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Logo Preview — Selva.tic</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@300&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; }

    .panel {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1.5rem;
      padding: 4rem 2rem; min-height: 50vh;
    }
    .panel > label {
      font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.4;
      margin-bottom: 0.5rem;
    }

    /* ── Componente logo ── */
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 0; line-height: 1;
    }
    .logo-wrap img { width: 220px; }
    .logo-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.6rem; font-weight: 800;
      letter-spacing: 6px; text-transform: uppercase;
      margin-top: -0.5rem;
    }
    .logo-slogan {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem; font-weight: 300;
      letter-spacing: 3px; text-transform: uppercase;
      color: #00B4D8; margin-top: 0.3rem;
    }

    /* colores del nombre según fondo */
    .name-dark  { color: #ffffff; }
    .name-light { color: #0a0a0a; }

    /* Fondos */
    .dark  { background: #0a0a0a; }
    .dark > label  { color: #fff; }

    .navy  { background: #0d1b2a; }
    .navy > label  { color: #fff; }

    .light { background: #f4f6f8; }
    .light > label { color: #333; }

    h2 {
      text-align: center; padding: 0.9rem; font-size: 0.65rem;
      letter-spacing: 4px; text-transform: uppercase;
      background: #1a1a1a; color: #555;
    }
  </style>
</head>
<body>

  <h2>── Versión fondo oscuro ────────────────────────</h2>

  <div class="panel dark">
    <label>Negro #0a0a0a</label>
    <div class="logo-wrap">
      <img src="logo-icon.png" alt="Ícono Selva.tic" />
      <div class="logo-name name-dark">SELVA.TIC</div>
      <div class="logo-slogan">Tecnología aplicada al turismo</div>
    </div>
  </div>

  <div class="panel navy">
    <label>Azul oscuro #0d1b2a</label>
    <div class="logo-wrap">
      <img src="logo-icon.png" alt="Ícono Selva.tic" />
      <div class="logo-name name-dark">SELVA.TIC</div>
      <div class="logo-slogan">Tecnología aplicada al turismo</div>
    </div>
  </div>

  <h2>── Versión fondo claro ─────────────────────────</h2>

  <div class="panel light">
    <label>Gris claro #f4f6f8</label>
    <div class="logo-wrap">
      <img src="logo-icon.png" alt="Ícono Selva.tic" />
      <div class="logo-name name-light">SELVA.TIC</div>
      <div class="logo-slogan">Tecnología aplicada al turismo</div>
    </div>
  </div>

  <div class="panel" style="background:#ffffff;">
    <label style="color:#333;font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;opacity:0.4;">Blanco puro</label>
    <div class="logo-wrap">
      <img src="logo-icon.png" alt="Ícono Selva.tic" />
      <div class="logo-name name-light">SELVA.TIC</div>
      <div class="logo-slogan">Tecnología aplicada al turismo</div>
    </div>
  </div>

</body>
</html>
